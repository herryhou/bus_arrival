[package]
name = "pico2-firmware"
version.workspace = true
edition.workspace = true

[features]
default = []
# Host testing feature (enables std, dev-only)
dev = ["shared/std", "gps_processor/std", "detection/std"]

[dependencies]
shared = { path = "../shared", default-features = false, features = [] }
gps_processor = { path = "../pipeline/gps_processor", default-features = false, features = [] }
detection = { path = "../pipeline/detection", default-features = false, features = [] }

# Embassy RP (replaces rp2040-hal)
# Note: Using minimal features to avoid problematic transitive dependencies
embassy-rp = { version = "0.3", default-features = false, features = ["rp235xb", "time-driver"] }
embassy-executor = { version = "0.7", default-features = false, features = ["arch-cortex-m", "executor-thread"] }
embassy-time = { version = "0.4", default-features = false, features = [] }
embassy-embedded-hal = { version = "0.3", default-features = false, features = [] }

# Core embedded (still needed)
cortex-m = { version = "0.7", default-features = false }
embedded-hal = { version = "1.0", default-features = false }
embedded-hal-nb = { version = "1.0", default-features = false }
nb = "1.0"

# Panic handler (no_std)
panic-halt = "1.0"

# For fixed-size Vec in no_std
heapless = { version = "0.8", default-features = false }
